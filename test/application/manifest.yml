version: 1
type: application
use_sandbox: true

application:
  name: "Hello World"
  bundle: "com.example.helloworld"
  exec: "main.py"

sandbox:
  portals:
    - org.freedesktop.portal.Notification
    - org.freedesktop.portal.Desktop

  filesystem:
    mounts:
      - type: dev
        target: /dev
      - type: tmp
        target: /tmp
      - type: bind
        source: /home/marina
        target: /home/marina
  permissions:
    /home/marina:
      type: READ+WRITE
